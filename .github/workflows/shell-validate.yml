name: Validate network diagnostics

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: network-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate Bash syntax
        run: bash -n scripts/cloud-netdiag.sh

      - name: Validate usage error handling
        run: |
          set +e
          bash scripts/cloud-netdiag.sh >/tmp/netdiag-output.txt 2>&1
          status=$?
          set -e
          cat /tmp/netdiag-output.txt
          test "$status" -eq 2
